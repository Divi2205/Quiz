<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #666;
        }

        .timer {
            font-weight: bold;
            color: #764ba2;
            font-size: 1.1em;
        }

        .timer.warning {
            color: #e74c3c;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .option:hover {
            background: #e8e9ff;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.correct {
            background: #2ecc71;
            color: white;
            border-color: #2ecc71;
        }

        .option.incorrect {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .option:disabled {
            cursor: not-allowed;
        }

        .next-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s ease;
            font-weight: bold;
        }

        .next-btn:hover {
            transform: translateY(-2px);
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            text-align: center;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 30px auto;
            color: white;
        }

        .score-number {
            font-size: 3em;
            font-weight: bold;
        }

        .score-text {
            font-size: 1em;
            margin-top: 5px;
        }

        .result-message {
            font-size: 1.5em;
            color: #333;
            margin: 20px 0;
        }

        .restart-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .restart-btn:hover {
            background: #667eea;
            color: white;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Quiz Time</h1>
        </div>

        <div id="quizSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="quiz-info">
                <span>Question <span id="currentQuestion">1</span> of <span id="totalQuestions">5</span></span>
                <span class="timer" id="timer">⏱️ 15s</span>
            </div>

            <div class="question-container">
                <div class="question" id="question"></div>
                <div class="options" id="options"></div>
            </div>

            <button class="next-btn" id="nextBtn" disabled>Next Question</button>
        </div>

        <div id="resultSection" class="hidden result-container">
            <h2 style="color: #667eea; margin-bottom: 20px;">Quiz Complete! 🎉</h2>
            <div class="score-circle">
                <div class="score-number" id="scoreNumber">0</div>
                <div class="score-text">out of <span id="totalScore">5</span></div>
            </div>
            <div class="result-message" id="resultMessage"></div>
            <button class="restart-btn" id="restartBtn">Take Quiz Again</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "What is the capital of France?",
                options: ["London", "Berlin", "Paris", "Madrid"],
                correct: 2
            },
            {
                question: "Which planet is known as the Red Planet?",
                options: ["Venus", "Mars", "Jupiter", "Saturn"],
                correct: 1
            },
            {
                question: "What is 2 + 2?",
                options: ["3", "4", "5", "6"],
                correct: 1
            },
            {
                question: "Who painted the Mona Lisa?",
                options: ["Vincent van Gogh", "Pablo Picasso", "Leonardo da Vinci", "Michelangelo"],
                correct: 2
            },
            {
                question: "What is the largest ocean on Earth?",
                options: ["Atlantic Ocean", "Indian Ocean", "Arctic Ocean", "Pacific Ocean"],
                correct: 3
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswer = null;
        let timer;
        let timeLeft = 15;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const nextBtn = document.getElementById('nextBtn');
        const currentQuestionEl = document.getElementById('currentQuestion');
        const totalQuestionsEl = document.getElementById('totalQuestions');
        const timerEl = document.getElementById('timer');
        const progressFill = document.getElementById('progressFill');
        const quizSection = document.getElementById('quizSection');
        const resultSection = document.getElementById('resultSection');
        const scoreNumber = document.getElementById('scoreNumber');
        const totalScore = document.getElementById('totalScore');
        const resultMessage = document.getElementById('resultMessage');
        const restartBtn = document.getElementById('restartBtn');

        totalQuestionsEl.textContent = quizData.length;
        totalScore.textContent = quizData.length;

        function startTimer() {
            timeLeft = 15;
            timerEl.classList.remove('warning');
            updateTimerDisplay();
            
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 5) {
                    timerEl.classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    handleTimeout();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            timerEl.textContent = `⏱️ ${timeLeft}s`;
        }

        function handleTimeout() {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.style.pointerEvents = 'none');
            showCorrectAnswer();
            nextBtn.disabled = false;
        }

        function showCorrectAnswer() {
            const options = document.querySelectorAll('.option');
            options.forEach((opt, idx) => {
                if (idx === quizData[currentQuestionIndex].correct) {
                    opt.classList.add('correct');
                }
            });
        }

        function loadQuestion() {
            selectedAnswer = null;
            clearInterval(timer);
            startTimer();
            
            const currentQuestion = quizData[currentQuestionIndex];
            questionEl.textContent = currentQuestion.question;
            currentQuestionEl.textContent = currentQuestionIndex + 1;
            
            const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
            progressFill.style.width = progress + '%';
            
            optionsEl.innerHTML = '';
            currentQuestion.options.forEach((option, index) => {
                const div = document.createElement('div');
                div.classList.add('option');
                div.textContent = option;
                div.addEventListener('click', () => selectAnswer(index, div));
                optionsEl.appendChild(div);
            });
            
            nextBtn.disabled = true;
        }

        function selectAnswer(index, element) {
            if (selectedAnswer !== null) return;
            
            clearInterval(timer);
            selectedAnswer = index;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.style.pointerEvents = 'none');
            
            element.classList.add('selected');
            
            if (index === quizData[currentQuestionIndex].correct) {
                element.classList.remove('selected');
                element.classList.add('correct');
                score++;
            } else {
                element.classList.add('incorrect');
                showCorrectAnswer();
            }
            
            nextBtn.disabled = false;
        }

        function showResults() {
            clearInterval(timer);
            quizSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            
            scoreNumber.textContent = score;
            
            const percentage = (score / quizData.length) * 100;
            if (percentage === 100) {
                resultMessage.textContent = "Perfect! You're a genius! 🌟";
            } else if (percentage >= 80) {
                resultMessage.textContent = "Excellent work! 🎯";
            } else if (percentage >= 60) {
                resultMessage.textContent = "Good job! Keep learning! 📚";
            } else {
                resultMessage.textContent = "Nice try! Practice makes perfect! 💪";
            }
        }

        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        restartBtn.addEventListener('click', () => {
            currentQuestionIndex = 0;
            score = 0;
            resultSection.classList.add('hidden');
            quizSection.classList.remove('hidden');
            loadQuestion();
        });

        loadQuestion();
    </script>
</body>
</html>
